<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
.card-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  width: calc((100% - 80px) / 5);
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
  box-sizing: border-box;
  background: #fff;
}

.card img {
  width: 100%;
  display: block;
}

.card p {
  padding: 10px;
  margin: 0;
  text-align: center;
}
</style>
</head>

<div class="card">
    <img src="https://via.placeholder.com/200x120" alt="">
